<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Factory — AI-Powered Idea Validation</title>
<meta name="description" content="Validate your startup idea in 30 seconds with AI. Get a validation score, pre-sell content, and a shareable report.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #080808;
  --surface: #0f0f0f;
  --border: #1f1f1f;
  --text: #efefef;
  --text-muted: #4a4a4a;
  --accent: #c8ff00;
  --green: #00e87a;
  --red: #ff3b3b;
  --orange: #ff9f1c;
  --blue: #4ea8de;
  --font: 'Syne', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  padding: 20px;
}

.container { max-width: 900px; margin: 0 auto; }

.header {
  text-align: center;
  margin-bottom: 30px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

h1 { font-size: 32px; font-weight: 800; color: var(--accent); margin-bottom: 6px; }

.subtitle {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.2em;
}

.nav-links {
  display: flex; gap: 16px; justify-content: center; margin-top: 12px;
}
.nav-links a {
  font-family: var(--mono); font-size: 11px; color: var(--text-muted);
  text-decoration: none; text-transform: uppercase; letter-spacing: 0.1em;
}
.nav-links a:hover { color: var(--accent); }

.status-badge {
  display: inline-block;
  margin-top: 12px;
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-muted);
}

.status-badge.connected { border-color: var(--green); color: var(--green); }
.status-badge.error { border-color: var(--red); color: var(--red); }

/* Stats bar */
.stats-bar {
  display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
}
.stat-item {
  flex: 1; min-width: 100px; text-align: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 8px;
}
.stat-num { font-size: 22px; font-weight: 800; color: var(--accent); }
.stat-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 20px;
}

.section-title {
  font-family: var(--mono); font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 16px;
}

.form-group { margin-bottom: 16px; }

label {
  display: block; font-family: var(--mono); font-size: 10px;
  color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.1em; margin-bottom: 8px;
}

input, textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 12px; border-radius: 8px;
  font-family: var(--font); font-size: 14px; outline: none;
  transition: border-color 0.2s;
}

input:focus, textarea:focus { border-color: var(--accent); }

textarea {
  resize: vertical; min-height: 100px;
  font-family: var(--mono); font-size: 13px; line-height: 1.6;
}

.btn {
  background: var(--accent); color: var(--bg); border: none;
  padding: 14px 28px; border-radius: 8px;
  font-family: var(--mono); font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  cursor: pointer; transition: transform 0.2s, opacity 0.2s; width: 100%;
}

.btn:hover:not(:disabled) { transform: translateY(-2px); }
.btn:active:not(:disabled) { transform: translateY(0); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-secondary {
  background: transparent; border: 1px solid var(--accent);
  color: var(--accent); padding: 10px 18px; border-radius: 8px;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em;
  cursor: pointer; text-decoration: none; display: inline-block;
}
.btn-secondary:hover { background: rgba(200,255,0,0.08); }

.loading {
  text-align: center; padding: 20px;
  font-family: var(--mono); font-size: 12px; color: var(--accent);
}

/* Results */
.result-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; margin-bottom: 12px;
}

.result-label {
  font-family: var(--mono); font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
}

.result-value { font-size: 15px; line-height: 1.5; color: var(--text); }

/* Score display */
.score-display {
  text-align: center; padding: 20px; margin-bottom: 20px;
}
.score-number { font-size: 64px; font-weight: 800; }
.score-bar { height: 8px; background: var(--border); border-radius: 4px; margin: 10px auto; max-width: 300px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }

/* Decision */
.decision {
  text-align: center; padding: 24px; margin-top: 20px;
  border: 2px solid var(--border); border-radius: 12px;
}
.decision.build { border-color: var(--green); background: rgba(0,232,122,0.05); }
.decision.kill { border-color: var(--red); background: rgba(255,59,59,0.05); }
.decision.test { border-color: var(--accent); background: rgba(200,255,0,0.05); }
.decision-text { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
.decision.build .decision-text { color: var(--green); }
.decision.kill .decision-text { color: var(--red); }
.decision.test .decision-text { color: var(--accent); }

/* Gates */
.gate-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.gate-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; text-align: center;
}
.gate-card.pass { border-color: var(--green); background: rgba(0,232,122,0.05); }
.gate-card.fail { border-color: var(--red); background: rgba(255,59,59,0.05); }
.gate-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.gate-result { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
.gate-card.pass .gate-result { color: var(--green); }
.gate-card.fail .gate-result { color: var(--red); }
.gate-reason { font-size: 12px; line-height: 1.4; color: var(--text-muted); }

/* Presell */
.presell-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.presell-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px;
}
.presell-label { font-family: var(--mono); font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
.presell-content { font-size: 13px; line-height: 1.5; color: var(--text); font-family: var(--mono); }

/* Share bar */
.share-bar {
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 16px;
}
.share-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-muted);
  padding: 8px 14px; border-radius: 6px;
  font-family: var(--mono); font-size: 10px; cursor: pointer; text-decoration: none;
  transition: all 0.2s;
}
.share-btn:hover { border-color: var(--accent); color: var(--accent); }
.share-btn.highlight { border-color: var(--accent); color: var(--accent); }

/* Twitter thread */
.thread-box {
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px; margin-top: 16px; white-space: pre-wrap;
  font-family: var(--mono); font-size: 12px; line-height: 1.6;
  max-height: 400px; overflow-y: auto;
}

/* Email capture */
.email-section {
  background: rgba(200,255,0,0.03); border: 1px solid var(--accent);
  border-radius: 14px; padding: 20px; text-align: center; margin-top: 20px;
}
.email-row {
  display: flex; gap: 10px; max-width: 400px; margin: 12px auto 0;
}
.email-row input { flex: 1; }
.email-row .btn { width: auto; }

.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--surface); border: 1px solid var(--border);
  padding: 12px 20px; border-radius: 8px;
  font-family: var(--mono); font-size: 12px;
  opacity: 0; transform: translateY(20px);
  transition: all 0.3s; pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 600px) {
  .gate-grid { grid-template-columns: 1fr; }
  .presell-grid { grid-template-columns: 1fr; }
  .stats-bar { gap: 8px; }
  .stat-item { min-width: 70px; padding: 8px 4px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>IDEA FACTORY</h1>
    <div class="subtitle">AI-Powered Idea Validation</div>
    <div class="nav-links">
      <a href="/public/graveyard">Idea Graveyard</a>
      <a href="/public/leaderboard">Leaderboard</a>
    </div>
    <div id="backendStatus" class="status-badge">Checking backend...</div>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-item"><div class="stat-num" id="statValidated">-</div><div class="stat-label">Validated</div></div>
    <div class="stat-item"><div class="stat-num" id="statBuilt">-</div><div class="stat-label">Built</div></div>
    <div class="stat-item"><div class="stat-num" id="statKilled">-</div><div class="stat-label">Killed</div></div>
    <div class="stat-item"><div class="stat-num" id="statAvgScore">-</div><div class="stat-label">Avg Score</div></div>
    <div class="stat-item"><div class="stat-num" id="statEmails">-</div><div class="stat-label">Emails</div></div>
  </div>

  <!-- Pain Input -->
  <div class="section">
    <div class="section-title">1. Pain Validation</div>

    <div class="form-group">
      <label>Who has this pain?</label>
      <input type="text" id="painWho" placeholder="e.g., Solo founders validating SaaS ideas">
    </div>

    <div class="form-group">
      <label>Direct quotes / complaints (2+ separate pain points)</label>
      <textarea id="painQuotes" placeholder="e.g.,
- 'I built for 6 months, nobody paid...'
- 'How do I know if my idea is worth building?'
- 'Wasted $10k on a product nobody wanted'"></textarea>
    </div>

    <div class="form-group">
      <label>How often do they feel this pain?</label>
      <input type="text" id="painFreq" placeholder="e.g., Every solo founder asks this weekly">
    </div>

    <div class="form-group">
      <label>Name 3+ real potential buyers</label>
      <input type="text" id="painBuyers" placeholder="e.g., @startupfounder, @indiemaker, @saasbuilder">
    </div>
  </div>

  <!-- Idea Input -->
  <div class="section">
    <div class="section-title">2. Your Idea</div>

    <div class="form-group">
      <label>Describe your idea (plain language)</label>
      <textarea id="rawIdea" placeholder="e.g., A tool that scrapes pain from Reddit and scores startup ideas before you build them"></textarea>
    </div>

    <div class="form-group">
      <label>Your email (optional — get notified of updates)</label>
      <input type="email" id="userEmail" placeholder="you@email.com">
    </div>

    <button class="btn" id="analyzeBtn" onclick="analyzeIdea()">
      Analyze Idea
    </button>
  </div>

  <div id="results"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = window.location.origin.includes('localhost:3000')
  ? 'http://localhost:8000'
  : window.location.origin;

let lastResult = null;

// ══════════════════════════════════════════════════
// BACKEND STATUS + STATS
// ══════════════════════════════════════════════════
async function checkBackend() {
  const badge = document.getElementById('backendStatus');
  try {
    const res = await fetch(API_BASE + '/');
    if (res.ok) {
      badge.textContent = 'Backend Connected';
      badge.className = 'status-badge connected';
      loadStats();
    } else {
      throw new Error('Backend error');
    }
  } catch(e) {
    badge.textContent = 'Backend Offline';
    badge.className = 'status-badge error';
    toast('Backend not running. Start with: cd backend && uvicorn main:app --reload');
  }
}

async function loadStats() {
  try {
    const res = await fetch(API_BASE + '/api/stats');
    const stats = await res.json();
    document.getElementById('statValidated').textContent = stats.validated || 0;
    document.getElementById('statBuilt').textContent = stats.built || 0;
    document.getElementById('statKilled').textContent = stats.killed || 0;
    document.getElementById('statAvgScore').textContent = stats.avg_score || 0;
    document.getElementById('statEmails').textContent = stats.total_emails || 0;
  } catch(e) { /* silent */ }
}

// ══════════════════════════════════════════════════
// ANALYZE IDEA
// ══════════════════════════════════════════════════
async function analyzeIdea() {
  const painWho = document.getElementById('painWho').value.trim();
  const painQuotes = document.getElementById('painQuotes').value.trim();
  const painFreq = document.getElementById('painFreq').value.trim();
  const painBuyers = document.getElementById('painBuyers').value.trim();
  const rawIdea = document.getElementById('rawIdea').value.trim();
  const email = document.getElementById('userEmail').value.trim();

  if (!painWho || !painQuotes || !painFreq || !painBuyers || !rawIdea) {
    toast('Fill all required fields'); return;
  }
  if (painQuotes.length < 80) {
    toast('Add more detailed pain quotes (80+ chars)'); return;
  }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';

  const resultsDiv = document.getElementById('results');
  resultsDiv.innerHTML = '<div class="loading">Sending to AI for analysis...</div>';

  try {
    const res = await fetch(API_BASE + '/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        raw_idea: rawIdea,
        email: email || null,
        pain: {
          pain_who: painWho,
          pain_quotes: painQuotes,
          pain_freq: painFreq,
          pain_buyers: painBuyers
        }
      })
    });

    if (!res.ok) {
      const errorText = await res.text();
      throw new Error(errorText || 'Analysis failed');
    }

    const data = await res.json();
    lastResult = data;
    displayResults(data);
    loadStats();
    toast('Analysis complete!');

  } catch(e) {
    resultsDiv.innerHTML = `<div class="section"><p style="color: var(--red);">Error: ${e.message}</p></div>`;
    toast(e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Analyze Idea';
  }
}

// ══════════════════════════════════════════════════
// DISPLAY RESULTS
// ══════════════════════════════════════════════════
function displayResults(data) {
  const scoreColor = data.score >= 70 ? 'var(--green)' : data.score >= 40 ? 'var(--orange)' : 'var(--red)';
  const decisionClass = data.final_decision.includes('KILL') ? 'kill' : data.final_decision.includes('TEST') ? 'test' : 'build';

  const shareUrl = data.share_url || '';
  const tweetText = encodeURIComponent(`I just validated a startup idea with AI and got a ${data.score}/100 score: ${data.concept}`);

  const html = `
    <!-- Score -->
    <div class="section">
      <div class="score-display">
        <div class="score-number" style="color:${scoreColor}">${data.score}</div>
        <div style="font-family:var(--mono); font-size:12px; color:var(--text-muted);">VALIDATION SCORE / 100</div>
        <div class="score-bar"><div class="score-fill" style="width:${data.score}%; background:${scoreColor};"></div></div>
      </div>
    </div>

    <!-- Analysis -->
    <div class="section">
      <div class="section-title">Analysis Results</div>
      <div class="result-item">
        <div class="result-label">Concept</div>
        <div class="result-value">${data.concept}</div>
      </div>
      <div class="result-item">
        <div class="result-label">Target User</div>
        <div class="result-value">${data.target_user}</div>
      </div>
      <div class="result-item">
        <div class="result-label">Core Pain</div>
        <div class="result-value">${data.core_pain}</div>
      </div>
      <div class="result-item">
        <div class="result-label">Value Promise</div>
        <div class="result-value">${data.value_promise}</div>
      </div>
      ${data.category ? `<div class="result-item"><div class="result-label">Category</div><div class="result-value">${data.category}</div></div>` : ''}
    </div>

    <!-- Gates -->
    <div class="section">
      <div class="section-title">3-Gate Evaluation</div>
      <div class="gate-grid">
        <div class="gate-card ${data.g1r.startsWith('YES') ? 'pass' : 'fail'}">
          <div class="gate-label">Gate 1</div>
          <div class="gate-result">${data.g1r.split('\u2014')[0].trim()}</div>
          <div class="gate-reason">${data.g1r.split('\u2014')[1] || ''}</div>
        </div>
        <div class="gate-card ${data.g2r.startsWith('YES') ? 'pass' : 'fail'}">
          <div class="gate-label">Gate 2</div>
          <div class="gate-result">${data.g2r.split('\u2014')[0].trim()}</div>
          <div class="gate-reason">${data.g2r.split('\u2014')[1] || ''}</div>
        </div>
        <div class="gate-card ${data.g3r.startsWith('YES') ? 'pass' : 'fail'}">
          <div class="gate-label">Gate 3</div>
          <div class="gate-result">${data.g3r.split('\u2014')[0].trim()}</div>
          <div class="gate-reason">${data.g3r.split('\u2014')[1] || ''}</div>
        </div>
      </div>

      <div class="decision ${decisionClass}">
        <div class="decision-text">${data.final_decision}</div>
        <div style="font-size:13px; color:var(--text-muted); margin-top:4px;">
          ${data.final_decision.includes('KILL')
            ? 'This idea failed validation. Move on to the next one.'
            : data.final_decision.includes('TEST')
              ? 'Post the pre-sell content below and track signals for 48 hours.'
              : 'All gates passed! Start building immediately.'}
        </div>
      </div>
    </div>

    <!-- Pre-sell Content -->
    <div class="section">
      <div class="section-title">Pre-Sell Content (Ready to Post)</div>
      <div class="presell-grid">
        <div class="presell-card">
          <div class="presell-label">Reddit Post <button class="share-btn" style="float:right;padding:2px 8px;" onclick="copyText('${escapeForAttr(data.reddit)}')">Copy</button></div>
          <div class="presell-content">${data.reddit}</div>
        </div>
        <div class="presell-card">
          <div class="presell-label">X / Twitter <button class="share-btn" style="float:right;padding:2px 8px;" onclick="copyText('${escapeForAttr(data.x_post)}')">Copy</button></div>
          <div class="presell-content">${data.x_post}</div>
        </div>
      </div>
      <div class="result-item" style="margin-top:12px;">
        <div class="result-label">Offer</div>
        <div class="result-value">${data.offer}</div>
      </div>
      <div class="result-item">
        <div class="result-label">Price</div>
        <div class="result-value">${data.price}</div>
      </div>
      <div class="result-item">
        <div class="result-label">Call to Action</div>
        <div class="result-value">${data.cta}</div>
      </div>
    </div>

    <!-- Share + Actions -->
    <div class="section" style="text-align:center;">
      <div class="section-title">Share & Download</div>
      <div class="share-bar">
        <a class="share-btn" href="https://twitter.com/intent/tweet?text=${tweetText}&url=${encodeURIComponent(shareUrl)}" target="_blank">Share on X</a>
        <a class="share-btn" href="https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(shareUrl)}&title=${encodeURIComponent(data.concept)}" target="_blank">Share on LinkedIn</a>
        <a class="share-btn" href="https://www.reddit.com/submit?url=${encodeURIComponent(shareUrl)}&title=${encodeURIComponent('AI Validation: ' + data.concept)}" target="_blank">Share on Reddit</a>
        <a class="share-btn" onclick="copyText('${escapeForAttr(shareUrl)}');this.textContent='Copied!';setTimeout(()=>this.textContent='Copy Link',2000)" style="cursor:pointer;">Copy Link</a>
      </div>
      <div style="display:flex; gap:10px; justify-content:center; margin-top:16px; flex-wrap:wrap;">
        <a class="btn-secondary" href="${API_BASE}/api/idea/${data.id}/pdf" target="_blank">Download PDF Report</a>
        <button class="btn-secondary" onclick="generateThread('${data.id}')">Generate Twitter Thread</button>
      </div>
      <div id="threadContainer"></div>
    </div>

    <!-- ID -->
    <div class="section" style="text-align:center; padding:16px; background:rgba(200,255,0,0.03);">
      <div style="font-family:var(--mono); font-size:11px; color:var(--text-muted);">
        IDEA ID: ${data.id} &middot; SCORE: ${data.score}/100
        ${shareUrl ? ` &middot; <a href="${shareUrl}" target="_blank" style="color:var(--accent);">Public Link</a>` : ''}
      </div>
    </div>
  `;

  document.getElementById('results').innerHTML = html;
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ══════════════════════════════════════════════════
// TWITTER THREAD GENERATOR
// ══════════════════════════════════════════════════
async function generateThread(ideaId) {
  const container = document.getElementById('threadContainer');
  container.innerHTML = '<div class="loading">Generating Twitter thread...</div>';

  try {
    const res = await fetch(API_BASE + `/api/idea/${ideaId}/twitter-thread`);
    if (!res.ok) throw new Error('Failed to generate thread');
    const data = await res.json();

    container.innerHTML = `
      <div class="thread-box">${data.thread}</div>
      <button class="share-btn highlight" style="margin-top:10px;" onclick="copyText(\`${data.thread.replace(/`/g, '\\`').replace(/\\/g, '\\\\')}\`)">Copy Thread</button>
    `;
    toast('Twitter thread generated!');
  } catch(e) {
    container.innerHTML = `<div style="color:var(--red); font-size:12px; margin-top:10px;">${e.message}</div>`;
  }
}

// ══════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════
function escapeForAttr(str) {
  return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, ' ');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('Copied!')).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('Copied!');
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
